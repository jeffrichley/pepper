[project]
name = "pepper"
version = "0.1.0"
description = "Pepper Second Brain"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "filelock>=3.25.2",
    "pyqmd>=0.1.0",
    "python-dotenv>=1.2.2",
    "pyyaml>=6.0.3",
    "rich>=14.3.3",
    "typer>=0.24.1",
    "watchdog>=6.0.0",
]

[dependency-groups]
dev = [
    "aiosqlite>=0.20.0",
    "apscheduler>=4.0.0a5",
    "discord-py>=2.0",
    "httpx>=0.28.1",
    "pytest>=9.0.2",
    "pytest-asyncio>=0.24.0",
    "ruff>=0.15.9",
    "sqlalchemy[asyncio]>=2.0",
]

[tool.pytest.ini_options]
pythonpath = [".claude/hooks"]
asyncio_mode = "auto"
markers = ["slow: tests that invoke real Claude Code sessions (cost API tokens)"]
